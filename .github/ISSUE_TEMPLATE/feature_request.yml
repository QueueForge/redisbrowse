name: Feature Request
description: Suggest a new feature or improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to make **redisbrowse** better? Describe it below.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Is there something you can't do right now that you wish you could? Describe the gap.
      placeholder: "I often need to... but currently there's no way to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How do you imagine this feature working?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you worked around the limitation in another way, or considered a different approach?

  - type: dropdown
    id: area
    attributes:
      label: Which area does this relate to?
      options:
        - Key browsing / filtering
        - Content preview (new Redis type support)
        - CLI arguments / connection options
        - Keyboard shortcuts / navigation
        - Visual layout / styling
        - Performance
        - Other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Mockups, related issues, links to similar tools, or anything else useful.